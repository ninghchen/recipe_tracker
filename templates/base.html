<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Recipe Tracker{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍊</text></svg>">
</head>
<body>
  <nav>
    <a href="{{ url_for('index') }}" class="nav-brand">Recipe Tracker</a>
    <ul class="nav-links nav-links-left">
      <li class="nav-dropdown">
        <button class="btn-categories" onclick="this.parentElement.classList.toggle('open')">☰ Categories</button>
        <ul class="dropdown-panel">
          {% for cat in categories %}
          <li><a href="{{ url_for('category', cat_id=cat.id) }}">{{ cat.name }}</a></li >
          {% endfor %}
        </ul>
      </li>
      <li><a href="{{ url_for('new_recipe') }}" class="btn-nav">+ New Recipe</a></li>
    </ul>
    <span class="nav-emoji">🍊</span>
  </nav>

  {% block content %}{% endblock %}

  <footer>
    <p>Hannah Chen &nbsp;·&nbsp; <a href="https://github.com/ninghchen" style="color:#195185;">github.com/ninghchen</a></p>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
